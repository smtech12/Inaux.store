<!-- WhatsApp floating button -->
<div class="whatsapp-float" id="whatsapp-float">
  <a class="cursor-pointer" (click)="openWhatsApp()" title="Chat on WhatsApp">
    <i class="fab fa-whatsapp"></i>
  </a>
</div>

<!-- Scroll to top -->
<div class="scroll-top" id="scroll" [style.display]="scrollDisplay">
  <a class="cursor-pointer" (click)="scrollToTop()">
    <i class="fas fa-level-up-alt"></i>
  </a>
</div>
